<!DOCTYPE html>
<html>
<head>
    <title>Admin - TechSpace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; font-family: Arial; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #111; border: 1px solid #222; border-radius: 20px; padding: 40px; width: 300px; text-align: center; }
        .login-box h2 { color: #00f5ff; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 1em; margin-bottom: 15px; }
        .btn { width: 100%; background: #00f5ff; color: #000; padding: 12px; border: none; border-radius: 10px; font-weight: bold; font-size: 1em; cursor: pointer; }
        .erro { color: #ff4444; margin-top: 10px; font-size: 0.9em; display: none; }
        .painel { display: none; }
        .card { background: #111; border: 1px solid #00f5ff; border-radius: 16px; padding: 30px; text-align: center; margin-top: 20px; }
        .card h3 { color: #aaa; margin-bottom: 10px; }
        .card .num { font-size: 3em; color: #00f5ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="tela-login">
    <div class="login-box">
        <h2>🔒 Admin</h2>
        <input type="password" id="senha" placeholder="Digite a senha" />
        <button class="btn" onclick="entrar()">Entrar</button>
        <p class="erro" id="erro">Senha incorreta!</p>
    </div>
</div>

<div id="tela-painel" class="painel" style="text-align:center; padding: 40px;">
    <h2 style="color:#00f5ff; margin-bottom:30px;">⚡ Painel Admin</h2>
    <div class="card">
        <h3>👁️ Total de Visitas</h3>
        <div class="num" id="num-visitas">...</div>
    </div>
    <br>
    <button class="btn" style="width:150px;" onclick="sair()">Sair</button>
</div>

<script>
    function entrar() {
        const senha = document.getElementById('senha').value;
        if (senha === '55555555') {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-painel').style.display = 'block';
            fetch('/visitas')
                .then(r => r.text())
                .then(n => document.getElementById('num-visitas').innerText = n);
        } else {
            document.getElementById('erro').style.display = 'block';
        }
    }
    function sair() {
        document.getElementById('tela-login').style.display = 'flex';
        document.getElementById('tela-painel').style.display = 'none';
        document.getElementById('senha').value = '';
    }
</script>
</body>
</html>
